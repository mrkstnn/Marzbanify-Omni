  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="HTML user portal for PasarGuard subscriptions, configs, and setup guides.">
    <meta name="theme-color" content="#fff">
    <link id="site-favicon" rel="icon" href="data:,">
    <title>User Portal</title>
    <script>
      (() => {
        const supportedLocales = { en: true, ru: true };
        let locale = 'en';
        try {
          const storedLocale = localStorage.getItem('locale');
          locale = (storedLocale || navigator.language || 'en').split('-')[0];
        } catch {
          locale = (navigator.language || 'en').split('-')[0];
        }
        if (!supportedLocales[locale]) {
          locale = 'en';
        }

        const userAgent = (navigator.userAgent || '').toLowerCase();
        let platform = 'ios';
        if (userAgent.includes('android')) {
          platform = 'android';
        } else if (userAgent.includes('iphone') || userAgent.includes('ipad')) {
          platform = 'ios';
        } else if (userAgent.includes('macintosh') || userAgent.includes('mac os x')) {
          platform = 'mac';
        } else if (userAgent.includes('windows')) {
          platform = 'windows';
        } else if (userAgent.includes('linux')) {
          platform = 'linux';
        }

        document.documentElement.lang = locale;
        document.documentElement.dataset.initialGuidePlatform = platform;
        document.title = locale === 'ru' ? 'Портал пользователя' : 'User Portal';
        document
          .querySelector('meta[name="description"]')
          ?.setAttribute(
            'content',
            locale === 'ru'
              ? 'HTML-портал пользователя PasarGuard с подписками, конфигурациями и гайдами по настройке.'
              : 'HTML user portal for PasarGuard subscriptions, configs, and setup guides.',
          );
      })();
    </script>
    <script>
      const COLOR_SCHEME = '(prefers-color-scheme: dark)';

      // Defines the default website theme used when the user hasn't
      // selected a different one.
      const DEFAULT_THEME = 'system';
      // Colors for light and dark themes in the theme-color value,
      // used to change browser interface colors, like the top bar in Safari.
      const META_THEME_COLORS = { light: '#fff', dark: '#151515' };

      function getBaseDomain(hostname = window.location.hostname) {
        if (
          !hostname ||
          hostname === 'localhost' ||
          hostname.includes(':') ||
          /^[\d.]+$/.test(hostname)
        ) {
          return hostname;
        }

        const parts = hostname.split('.').filter(Boolean);
        if (parts.length <= 2) {
          return hostname;
        }

        return parts.slice(-2).join('.');
      }

      function setFavicon() {
        const favicon = document.getElementById('site-favicon');
        if (!favicon) {
          return;
        }

        if (window.location.protocol === 'file:') {
          favicon.setAttribute('href', 'data:,');
          return;
        }

        const baseDomain = getBaseDomain();
        if (!baseDomain) {
          return;
        }

        favicon.setAttribute('href', `${window.location.protocol}//${baseDomain}/favicon.ico`);
      }

      function safeStorageGet(key, fallback = null) {
        try {
          return localStorage.getItem(key) || fallback;
        } catch {
          return fallback;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {
          // Ignore storage errors and keep the UI usable.
        }
      }

      const colorSchemeMedia = typeof window.matchMedia === 'function'
        ? window.matchMedia(COLOR_SCHEME)
        : null;

      function getUserTheme() {
        return safeStorageGet('theme', DEFAULT_THEME);
      }

      function setTheme(theme) {
        if (theme === 'system') {
          theme = colorSchemeMedia?.matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-bs-theme', theme);
        document
          .querySelector(`[name='theme-color']`)
          ?.setAttribute('content', META_THEME_COLORS[theme]);
      }

      setFavicon();
      setTheme(getUserTheme());
      const handleColorSchemeChange = () => {
        if (getUserTheme() === 'system') {
          setTheme('system');
        }
      };
      colorSchemeMedia?.addEventListener?.('change', handleColorSchemeChange);

      document.addEventListener('DOMContentLoaded', () => {
        const btnTheme = document.getElementById('btn-theme');
        const updateThemeDropdownState = item => {
          showActiveDropdownItem(
            btnTheme,
            item,
            getActiveItem('.my-dropdown-item-theme'),
          );
        };

        document.querySelectorAll('.my-dropdown-item-theme').forEach(item => {
          item.addEventListener('click', () => {
            safeStorageSet('theme', item.dataset.themeVal);
            setTheme(item.dataset.themeVal);
            updateThemeDropdownState(item);
          });
        });

        updateThemeDropdownState(getItemByData('data-theme-val', getUserTheme()));
      });
    </script>

      function getUserLocale() {
        const userLocale = (
          safeStorageGet('locale') ||
          (navigator.language || 'en').split('-')[0]
        );
        return userLocale in MESSAGES ? userLocale : DEFAULT_LOCALE;
      }

      function getTabIdByDevice() {
        const userAgent = navigator.userAgent.toLowerCase();
        if (userAgent.includes('android')) {
          return '#tab-android';
        }
        if (userAgent.includes('iphone') || userAgent.includes('ipad')) {
          return '#tab-ios';
        }
        if (userAgent.includes('macintosh') || userAgent.includes('mac os x')) {
          return '#tab-mac';
        }
        if (userAgent.includes('windows')) {
          return '#tab-windows';
        }
        if (userAgent.includes('linux')) {
          return '#tab-linux';
        }
        return '#tab-ios';
      }

        return GUIDE_COPY[getUserLocale()] || GUIDE_COPY.en;

        return GUIDE_PLATFORMS.filter(platform => getGuideOptions(platform).length);
      }

      function getGuideAppMode(appConfig) {
        if (!appConfig) {
          return 'subscription';
        }
        if (appConfig.manualSubscription) {
          return 'manual_subscription';
        }
        if (appConfig.configFormat) {
          return 'config';
        }
        return 'subscription';
      }

      function getMessageValue(key, locale = getUserLocale()) {
        const resolve = source =>
          key
            .split('.')
            .reduce(
              (value, part) => (value && part in value ? value[part] : undefined),
              source,
            );
        const localizedValue = resolve(MESSAGES[locale] || {});
        if (localizedValue !== undefined) {
          return localizedValue;
        }
        return resolve(MESSAGES[DEFAULT_LOCALE] || {});
      }

      function translate(key) {
        const value = getMessageValue(key);
        return typeof value === 'string' ? value : key;
      }

      function formatGuideText(text, vars) {
        if (typeof text !== 'string') {
          return '';
        }
        return text.replace(/\{(\w+)\}/g, (_, key) => escapeHtml(vars[key] || ''));
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => (
          {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            '\'': '&#39;',
          }[char]
        ));
      }

      function setFormattedHtml(element, template, vars) {
        if (!element) {
          return '';
        }

        const html = formatGuideText(template, vars);
        element.innerHTML = html;
        return html;

        return normalizedUrl;

      function encodeRoutingProfileBase64(payload) {
        const bytes = new TextEncoder().encode(payload);
        let binary = '';
        bytes.forEach(byte => {
          binary += String.fromCharCode(byte);

        return btoa(binary);

            if (!payload) {
              throw new Error('Routing profile is empty');
            }
            const encodedPayload = encodeRoutingProfileBase64(payload);
            routingProfileBase64ByApp[appId] = encodedPayload;
            cacheRoutingProfileBase64(appId, encodedPayload);
            return encodedPayload;
          })
          .catch(() => {
            routingProfileBase64ByApp[appId] =
              readCachedRoutingProfileBase64(appId) ||
              encodeRoutingProfileBase64(ROUTING_PROFILE_FALLBACK_JSON[appId] || '');
            return routingProfileBase64ByApp[appId];
          });

        return routingProfilePromises[appId];

          const [rawLink, rawFragment = ''] = link.split('#');
          let label = safeDecodeURIComponent(rawFragment || '')
            .replace(/\+/g, ' ')
            .trim();
          if (!label) {
            const scheme = rawLink.split(':')[0];
            label = `${scheme.toUpperCase()} ${index + 1}`;

        async function getPasarguardConfigEntries() {
          if (!isPasarguardSubscriptionUrl()) {
            return [];
          }

          if (pasarguardConfigEntriesCache) {
            return pasarguardConfigEntriesCache;
          }

          if (pasarguardConfigEntriesPromise) {
            return pasarguardConfigEntriesPromise;
          }

          pasarguardConfigEntriesPromise = (async () => {
            const resource = await fetchPasarguardFormatResource('links');
            if (resource.available === false) {
              pasarguardConfigEntriesCache = [];
              return [];
            }
            if (resource.available !== true) {
              throw resource.error || new Error('Failed to resolve PasarGuard links format');
            }

            pasarguardConfigEntriesCache = (resource.text || '')
              .split(/\r?\n+/)
              .map(line => line.trim())
              .filter(Boolean)
              .map((line, index) => ({
                label: extractNameFromConfigURL(line, index),
                link: line,
              }));
            return pasarguardConfigEntriesCache;
          })();

          try {
            return await pasarguardConfigEntriesPromise;
          } finally {
            pasarguardConfigEntriesPromise = null;
          }
        }

        function getPasarguardFallbackFilename(format) {
          return PASARGUARD_DOWNLOAD_FILENAMES[format] || `config-${format}.txt`;
        }

        function parsePasarguardFilename(disposition, fallbackName) {
          if (!disposition) {
            return fallbackName;
          }

          const utfMatch = disposition.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
          if (utfMatch?.[1]) {
            return safeDecodeURIComponent(utfMatch[1]);
          }

          const plainMatch = disposition.match(/filename\s*=\s*"([^"]+)"/i) || disposition.match(/filename\s*=\s*([^;]+)/i);
          if (plainMatch?.[1]) {
            return plainMatch[1].trim();
          }

          return fallbackName;
        }

        function triggerPasarguardDownload(blob, filename) {
          const objectUrl = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = objectUrl;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
        }

        async function fetchPasarguardFormatResource(format) {
          if (pasarguardFormatRequestCache[format]) {
            return pasarguardFormatRequestCache[format];
          }

          pasarguardFormatRequestCache[format] = (async () => {
            const formatUrl = buildPasarguardFormatUrl(format);

            try {
              const response = await fetch(formatUrl, {
                credentials: 'same-origin',
              });

              if (response.status === 406) {
                return {
                  format,
                  url: formatUrl,
                  available: false,
                  status: 406,
                };
              }

              if (!response.ok) {
                throw new Error(`Failed to fetch PasarGuard format ${format}: ${response.status}`);
              }

              const disposition = response.headers.get('content-disposition') || '';
              const filename = parsePasarguardFilename(disposition, getPasarguardFallbackFilename(format));

              if (format in PASARGUARD_DOWNLOAD_FILENAMES) {
                return {
                  format,
                  url: formatUrl,
                  available: true,
                  filename,
                  blob: await response.blob(),
                };
              }

              return {
                format,
                url: formatUrl,
                available: true,
                filename,
                text: await response.text(),
              };
            } catch (error) {
              return {
                format,
                url: formatUrl,
                available: null,
                error,
              };
            }
          })();

          return pasarguardFormatRequestCache[format];
        }

        function shouldShowQrForFormat(format, resource) {
          if (format === 'outline') {
            return Boolean((resource.text || '').trim());
          }
          return false;
        }

        function getPasarguardFormatSubtitle(format) {
          if (format === 'xray') {
            return translate('getLinkModalSubtitleXray');
          }
          if (format === 'clash') {
            return translate('getLinkModalSubtitleClash');
          }
          if (format === 'clash_meta') {
            return translate('getLinkModalSubtitleClashMeta');
          }
          if (format === 'outline') {
            return translate('getLinkModalSubtitleOutline');
          }
          if (format === 'sing_box') {
            return translate('getLinkModalSubtitleSingBox');
          }
          return translate('getLinkModalSubtitleConfig');
        }

        async function openPasarguardFormatModal(format, label) {
          const resource = await fetchPasarguardFormatResource(format);

          if (resource.available !== true) {
            return false;
          }

          const isDownload = ['clash', 'clash_meta', 'sing_box'].includes(format);
          showLinkModal({
            link: resource.text || resource.url,
            title: label,
            subtitle: getPasarguardFormatSubtitle(format),
            kind: 'config',
            buttonLabel: isDownload ? translate('downloadFile') : translate('copyConfig'),
            showQr: shouldShowQrForFormat(format, resource),
            illustrationType: format,
            action: async () => {
              if (isDownload) {
                triggerPasarguardDownload(resource.blob, resource.filename);
                return;
              }
              await copyText((resource.text || '').trim());
            },
            successLabel: isDownload ? translate('downloading') : translate('copied'),
          });

          return true;
        }

        async function getPasarguardFormatActions() {
          const actionDefinitions = [
            { format: 'clash', label: translate('configClash') },
            { format: 'clash_meta', label: translate('configClashMeta') },
            { format: 'outline', label: translate('configOutline') },
            { format: 'sing_box', label: translate('configSingBox') },
            { format: 'xray', label: translate('configXray') },
          ];

          const resources = await Promise.all(
            actionDefinitions.map(async definition => ({
              ...definition,
              resource: await fetchPasarguardFormatResource(definition.format),
            })),
          );

          return resources
            .filter(({ resource }) => resource.available === true)
            .map(({ format, label }) => ({
              label,
              onClick: async element => {
                const opened = await openPasarguardFormatModal(format, label);
                if (!opened) {
                  setDropdownItemFeedback(element, translate('unavailable'));
                }
              },
            }));
        }

        function createExternalLinkButton({ href, label, className }) {
          const link = document.createElement('a');
          link.className = className;
          const safeHref = getSafeExternalUrl(href);
          if (safeHref) {
            link.href = safeHref;
          }
          link.rel = 'noopener noreferrer';
          link.target = '_blank';
          link.textContent = label;
          return link;
        }

        function createDropdownActionItem({ label, onClick, disabled = false }) {
          const li = document.createElement('li');
          const element = document.createElement(disabled ? 'span' : 'button');

          element.className = disabled ? 'dropdown-item disabled' : 'dropdown-item';
          element.textContent = label;

          if (disabled) {
            element.setAttribute('aria-disabled', 'true');
            li.appendChild(element);
            return li;
          }

          element.type = 'button';
          element.addEventListener('click', () => onClick?.(element));
          li.appendChild(element);
          return li;
        }

        function setDropdownItemFeedback(element, label, disabled = true, timeoutMs = 1600) {
          if (!element) {
            return;
          }

          const previousLabel = element.textContent;
          element.textContent = label;

          if (disabled) {
            element.disabled = true;
          }

          window.setTimeout(() => {
            element.textContent = previousLabel;
            if (disabled) {
              element.disabled = false;
            }
          }, timeoutMs);
        }

        function createDropdownDivider() {
          const li = document.createElement('li');
          const divider = document.createElement('hr');
          divider.className = 'dropdown-divider';
          li.appendChild(divider);
          return li;
        }

        function removeTrailingDropdownDivider(menu) {
          const lastElement = menu?.lastElementChild;
          if (lastElement?.querySelector('.dropdown-divider')) {
            lastElement.remove();
          }
        }

        function createDropdownSectionLabel(label) {
          const li = document.createElement('li');
          const element = document.createElement('span');
          element.className = 'dropdown-item my-dropdown-section-label';
          element.textContent = label;
          li.appendChild(element);
          return li;
        }

        function createDropdownCheckIcon() {
          const checkIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          checkIcon.setAttribute('class', 'bi my-dropdown-item-check');
          checkIcon.setAttribute('aria-hidden', 'true');
          checkIcon.setAttribute('focusable', 'false');

          const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
          use.setAttribute('href', '#check-lg');
          checkIcon.appendChild(use);

          return checkIcon;
        }

        function appendSubscriptionMenuBaseItems({ showLoading = false } = {}) {
          subscriptionActionsMenu.appendChild(
            createDropdownActionItem({
              label: translate('getSubscription'),
              onClick: () => {
                showLinkModal({
                  link: SUB_URL,
                  title: translate('getLinkModalTitleSubscription'),
                  subtitle: translate('getLinkModalSubtitleSubscription'),
                  kind: 'subscription',
                });
              },
            }),
          );

          subscriptionActionsMenu.appendChild(createDropdownDivider());
          subscriptionActionsMenu.appendChild(
            createDropdownSectionLabel(translate('configSection')),
          );

          if (showLoading) {
            subscriptionActionsMenu.appendChild(
              createDropdownActionItem({
                label: translate('getConfigLoading'),
                disabled: true,
              }),
            );
          }
        }

        async function renderSubscriptionMenu() {
          if (!subscriptionActionsMenu) {
            return;
          }

          clearElement(subscriptionActionsMenu);
          appendSubscriptionMenuBaseItems({ showLoading: true });

          const formatActions = await getPasarguardFormatActions();
          let resolvedConfigs = [];
          try {
            resolvedConfigs = await getPasarguardConfigEntries();
          } catch {
            resolvedConfigs = isPasarguardSubscriptionUrl()
              ? [{ label: 'links', link: buildPasarguardLinksUrl(), external: true }]
              : [];
          }

          clearElement(subscriptionActionsMenu);
          appendSubscriptionMenuBaseItems();

          if (resolvedConfigs.length) {
            resolvedConfigs.forEach(config => {
              subscriptionActionsMenu.appendChild(
                createDropdownActionItem({
                  label: config.label,
                  onClick: () => {
                    if (config.external) {
                      const safeConfigLink = getSafeExternalUrl(config.link);
                      if (safeConfigLink) {
                        window.open(safeConfigLink, '_blank', 'noopener,noreferrer');
                      }
                      return;
                    }
                    showLinkModal({
                      link: config.link,
                      title: translate('getLinkModalTitleConfig'),
                      subtitle: translate('getLinkModalSubtitleConfig'),
                      kind: 'config',
                    });
                  },
                }),
              );
            });

            subscriptionActionsMenu.appendChild(createDropdownDivider());
          }

          if (!resolvedConfigs.length && !formatActions.length) {
            subscriptionActionsMenu.appendChild(
              createDropdownActionItem({
                label: translate('getConfigEmpty'),
                disabled: true,
              }),
            );
          }

          formatActions.forEach(action => {
            subscriptionActionsMenu.appendChild(
              createDropdownActionItem({
                label: action.label,
                onClick: action.onClick,
              }),
            );
            subscriptionActionsMenu.appendChild(createDropdownDivider());
          });

          removeTrailingDropdownDivider(subscriptionActionsMenu);

        }

        if (copyLinkButton) {
          copyLinkButton.addEventListener('click', async () => {
            try {
              if (activeModalAction) {
                await activeModalAction();
              } else {
                await copyText(activeModalLink);
              }
              copyLinkButton.textContent = activeModalSuccessLabel || translate('copied');
              copyLinkButton.disabled = true;
              copyButtonResetTimer = setTimeout(() => {
                resetCopyButtonLabel();
                copyButtonResetTimer = null;
              }, MODAL_COPY_RESET_DELAY_MS);
            } catch {
              copyLinkButton.textContent = activeModalErrorLabel || translate('copyFailed');
            }
          });
        }

        function renderGuideInstallButtons(platform, appConfig) {
          const { firstActions: actions } = getGuideElements(platform);
          if (!actions) {
            return;
          }

          clearElement(actions);

          if (!appConfig.installButtons.length) {
            setElementVisible(actions, false);
            return;
          }

          setElementVisible(actions, true);

          appConfig.installButtons.forEach(button => {
            actions.appendChild(
              createExternalLinkButton({
                href: button.href,
                className: 'btn my-btn-secondary my-btn-install',
                label: button.labelLocales
                  ? (button.labelLocales[getUserLocale()] || button.labelLocales.en)
                  : button.label,
              }),
            );
          });
        }

        function updateGuideRoutingButton(platform, appConfig, copy) {
          const { routingButton, thirdText: thirdTextElement } = getGuideElements(platform);
          if (!routingButton) {
            return;
          }

          const resetRoutingButton = () => {
            setElementVisible(routingButton, false);
            routingButton.textContent = '';
            routingButton.removeAttribute('href');
            if (thirdTextElement?.dataset.baseText) {
              thirdTextElement.innerHTML = thirdTextElement.dataset.baseText;
            }
          };

          const setRoutingButtonState = () => {
            const routingBase64 = getRoutingProfileBase64(appConfig.id);
            if (typeof appConfig.routingUrlBuilder !== 'function' || !routingBase64) {
              resetRoutingButton();
              return;
            }

            if (thirdTextElement?.dataset.baseText) {
              thirdTextElement.innerHTML =
                `${thirdTextElement.dataset.baseText}<br><br>${formatGuideText(copy.routingText, {})}`;
            }
            routingButton.textContent = copy.addRouting;
            const routingUrl = getSafeExternalUrl(appConfig.routingUrlBuilder(routingBase64));
            if (!routingUrl) {
              resetRoutingButton();
              return;
            }
            routingButton.href = routingUrl;
            setElementVisible(routingButton, true);
          };

          setRoutingButtonState();

          if (typeof appConfig.routingUrlBuilder !== 'function') {
            return;
          }

          loadRoutingProfileBase64(appConfig.id).then(() => {
            const currentSelectedApp = selectedGuideApps[platform];
            if (currentSelectedApp === appConfig.id) {
              setRoutingButtonState();
            }
          });
        }

        function updateGuideMinOsText(minOsElement, copy, vars, minOs) {
          if (minOs) {
            minOsElement.textContent = formatGuideText(copy.minimumOs, vars);
            setElementVisible(minOsElement, true);
            return;
          }

          minOsElement.textContent = '';
          setElementVisible(minOsElement, false);
        }

        function getGuideStepTwoState(copy, appConfig, platform, appId) {
          const mode = getGuideAppMode(appConfig);

          if (mode === 'config') {
            return {
              title: copy.outlineAddConfigTitle || copy.importConfigTitle,
              text: copy.importConfigTextOutline,
              buttonLabel: copy.openConfig,
            };
          }

          if (mode === 'manual_subscription' || isManualV2rayNGuide(platform, appId)) {
            return {
              title: copy.addTitle,
              text: appConfig.manualSubscription ? copy.addTextManualSubscription : copy.addTextV2rayNWindows,
              buttonLabel: copy.copySubscription,
            };
          }

          return {
            title: copy.addTitle,
            text: copy.addText,
            buttonLabel: copy.addSubscription,
          };
        }

        function setGuideSubscriptionButtonBehavior({
          button,
          platform,
          appId,
          copy,
          appConfig,
          subscriptionUrl,
        }) {
          const mode = getGuideAppMode(appConfig);

          if (mode === 'config' && appConfig?.configFormat) {
            restoreGuideSubscriptionButton(button, copy.openConfig);
            button.onclick = async event => {
              event.preventDefault();
              if (button.classList.contains('my-btn-muted')) {
                return;
              }

              const opened = await openPasarguardFormatModal(appConfig.configFormat, appConfig.label);
              if (!opened) {
                showManualSubscriptionFeedback(
                  button,
                  platform,
                  appId,
                  copy.openConfig,
                  translate('unavailable'),
                );
              }
            };
            return;
          }

          if (mode === 'manual_subscription' || isManualV2rayNGuide(platform, appId)) {
            restoreGuideSubscriptionButton(button, copy.copySubscription);
            button.onclick = async event => {
              event.preventDefault();
              if (button.classList.contains('my-btn-muted')) {
                return;
              }

              try {
                await copyText(SUB_URL);
                showManualSubscriptionFeedback(
                  button,
                  platform,
                  appId,
                  copy.copySubscription,
                  translate('copied'),
                );
              } catch {
                showManualSubscriptionFeedback(
                  button,
                  platform,
                  appId,
                  copy.copySubscription,
                  translate('copyFailed'),
                );
              }
            };
            return;
          }

          restoreGuideSubscriptionButton(button, copy.addSubscription, subscriptionUrl);
          button.onclick = null;
        }

        function updateGuideContent(platform, appId) {
          const copy = getGuideCopy() || GUIDE_COPY.en;
          const appConfig = getResolvedGuideAppConfig(platform, appId);
          if (!appConfig) {
            return;
          }
          const vars = {
            app: appConfig.label,
            platform: getPlatformLabel(platform),
            minOs: appConfig.minOs || '-',
          };
          const guideElements = getGuideElements(platform);
          if (
            !guideElements.firstTitle ||
            !guideElements.firstText ||
            !guideElements.firstMinOs ||
            !guideElements.secondTitle ||
            !guideElements.secondText ||
            !guideElements.thirdTitle ||
            !guideElements.thirdText ||
            !guideElements.subscriptionButton
          ) {
            return;
          }

          guideElements.firstTitle.textContent = formatGuideText(copy.installAndOpen, vars);
          setFormattedHtml(guideElements.firstText, copy.installText, vars);
          updateGuideMinOsText(guideElements.firstMinOs, copy, vars, appConfig.minOs);
          const stepTwoState = getGuideStepTwoState(copy, appConfig, platform, appId);
          guideElements.secondTitle.textContent = stepTwoState.title;
          setFormattedHtml(guideElements.secondText, stepTwoState.text, vars);
          guideElements.thirdTitle.textContent = copy.connectTitle;
          const connectText = getGuideConnectText(copy, platform, appId);
          const thirdTextElement = guideElements.thirdText;
          thirdTextElement.dataset.baseText = setFormattedHtml(thirdTextElement, connectText, vars);
          setGuideSubscriptionButtonBehavior({
            button: guideElements.subscriptionButton,
            platform,
            appId,
            copy,
            appConfig,
            subscriptionUrl: appConfig.subscriptionUrl,
          });

          renderGuideInstallButtons(platform, appConfig);
          updateGuideRoutingButton(platform, appConfig, copy);
        }

        function showActiveAppItem(item) {
          showActiveDropdownItem(
            btnGuideApp,
            item,
            guideAppMenu?.querySelector('.active') || null,
          );
        }

        function syncGuidePlatformState(item) {
          if (!item) {
            return;
          }

          activeGuidePlatform = item.dataset.guidePlatform;
          showActiveDropdownItem(
            btnGuide,
            item,
            getActiveItem(guideItemSelector),
          );
          renderGuideAppMenu(activeGuidePlatform);
        }

        function finalizeGuideUi() {
          GUIDE_PLATFORMS.forEach(platform => {
            const tabButton = document.querySelector(`[data-guide-platform="${platform}"]`);
            const tabItem = tabButton?.closest('li') || tabButton;
            const tabPane = document.getElementById(`tab-${platform}`);
            const visible = getGuideOptions(platform).length > 0;
            setElementVisible(tabItem, visible);
            setElementVisible(tabPane, visible);
          });

          renderSubscriptionMenu();
          resetCopyButtonLabel();
        }

        function renderGuideAppMenu(platform) {
          const guideConfig = GUIDE_APPS[platform];
          const options = getGuideOptions(platform);
          if (!guideConfig || !options.length) {
            return;
          }
          const { defaultApp } = guideConfig;
          const selectedApp =
            selectedGuideApps[platform] &&
            options.some(option => option.id === selectedGuideApps[platform])
              ? selectedGuideApps[platform]
              : (options.some(option => option.id === defaultApp) ? defaultApp : options[0].id);

          if (!guideAppMenu) {
            return;
          }

          clearElement(guideAppMenu);
          options.forEach(option => {
            const li = document.createElement('li');
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `dropdown-item my-dropdown-item-guide-app${option.id === selectedApp ? ' active' : ''}`;
            button.dataset.appId = option.id;
            const label = document.createElement('span');
            label.textContent = option.label;
            if (option.recommended) {
              const badge = document.createElement('span');
              badge.className = 'my-badge-recommended';
              badge.setAttribute('aria-hidden', 'true');
              badge.textContent = '★';
              label.appendChild(badge);
            }
            button.appendChild(label);
            button.appendChild(createDropdownCheckIcon());
            button.addEventListener('click', () => {
              selectedGuideApps[platform] = option.id;
              showActiveAppItem(button);
              updateGuideContent(platform, option.id);
            });
            li.appendChild(button);
            guideAppMenu.appendChild(li);
          });

          const resolvedAppId = options.some(option => option.id === selectedApp)
            ? selectedApp
            : options[0].id;
          const activeItem = guideAppMenu.querySelector(`[data-app-id="${resolvedAppId}"]`);
          selectedGuideApps[platform] = resolvedAppId;
          showActiveAppItem(activeItem);
          updateGuideContent(platform, resolvedAppId);
        }

        document.addEventListener('guide:refresh', () => {
          const activeItem = getActiveItem(guideItemSelector);
          if (!activeItem) {
            return;
          }

          syncGuidePlatformState(activeItem);
          finalizeGuideUi();
        });

        document.querySelectorAll(guideItemSelector).forEach(item => {
          item.addEventListener('click', () => {
            syncGuidePlatformState(item);
          });
        });

        const preferredGuidePlatform =
          document.documentElement.dataset.initialGuidePlatform || getTabIdByDevice().replace('#tab-', '');
        const visibleGuidePlatforms = getAvailableGuidePlatforms();
        const initialGuidePlatform = visibleGuidePlatforms.includes(preferredGuidePlatform)
          ? preferredGuidePlatform
          : visibleGuidePlatforms[0];
        const initialGuideButton = initialGuidePlatform
          ? document.querySelector(`${guideItemSelector}[data-guide-platform="${initialGuidePlatform}"]`)
          : null;
        if (!initialGuideButton) {
          finalizeGuideUi();
          return;
        }
        if (window.bootstrap?.Tab) {
          bootstrap.Tab.getOrCreateInstance(initialGuideButton).show();
        }
        syncGuidePlatformState(initialGuideButton);
        finalizeGuideUi();
      });
    </script>
  </body>
</html>
